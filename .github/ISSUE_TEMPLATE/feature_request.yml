name: 기능 요청
description: 새 기능·개선 제안
title: "[feat] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 사용자/운영 관점에서 무엇이 불편한가
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안
      description: 어떤 동작/엔드포인트/스키마가 추가되면 되는가
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안 / 검토한 옵션
  - type: dropdown
    id: priority
    attributes:
      label: 우선순위 (제안)
      options:
        - 높음
        - 중간
        - 낮음
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 영향 / 트레이드오프
      description: LLM 비용·DB 스키마·클라이언트 호환·보안 등
