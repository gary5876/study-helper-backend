name: 버그 리포트
description: 백엔드 동작 이상·오류·회귀를 보고
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        가능한 한 재현 가능한 형태로 작성해 주세요. 민감 정보(API 키·토큰)는 마스킹.
  - type: textarea
    id: summary
    attributes:
      label: 증상 요약
      description: 무엇이 어떻게 잘못되는지 1~3줄
      placeholder: "/result/{id} 호출 시 어제 만든 세션이 404로 영구 실패"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 재현 절차
      description: 단계별로
      placeholder: |
        1. PDF 업로드 (plan=paid)
        2. 24시간 대기
        3. GET /result/{id}
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 응답 코드·에러 메시지·로그(민감 정보 마스킹)
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 영향 영역
      multiple: true
      options:
        - "/upload"
        - "/generate"
        - "/status"
        - "/result"
        - "/user/*"
        - "auth (JWT/JWKS)"
        - "session_store (Redis/DB)"
        - "LLM 클라이언트 (anthropic/openai/timely/gemini)"
        - "PDF 파서"
        - "응답 검증 (validator)"
        - "마이그레이션"
        - "CI/CD"
        - "기타"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 환경
      description: 로컬 docker / staging / production / 커밋 SHA
      placeholder: "production / a923b21"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 추가 정보
      description: 관련 PR/이슈, 의심 가설, 부분 분석 등
