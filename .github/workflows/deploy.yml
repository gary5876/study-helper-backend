name: Backend Deploy

# Triggers only on main push (CI checks live in ci.yml)
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-deploy-main
  cancel-in-progress: true

permissions:
  id-token: write   # OIDC
  contents: read

env:
  AWS_REGION: ap-northeast-2
  AWS_ROLE_ARN: arn:aws:iam::250847881242:role/github-actions-deploy
  ECR_REGISTRY: 250847881242.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: study-helper-backend
  EC2_INSTANCE_ID: i-0df76ef3c1ad3fb75

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push (SHA tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Sync GH Secrets → SSM Parameter Store (SecureString).
  # deploy.sh on EC2 fetches these at runtime.
  sync-secrets:
    name: Sync secrets to Parameter Store
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Put SecureString parameters
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          put() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::warning::secret '$name' is empty — skipping (existing param retained)"
              return
            fi
            aws ssm put-parameter \
              --region "$AWS_REGION" \
              --name "$name" \
              --value "$value" \
              --type SecureString \
              --overwrite \
              --no-cli-pager > /dev/null
            echo "  put: $name"
          }
          put "/study-helper/backend/SUPABASE_URL"              "$SUPABASE_URL"
          put "/study-helper/backend/SUPABASE_SERVICE_ROLE_KEY" "$SUPABASE_SERVICE_ROLE_KEY"
          put "/study-helper/backend/SUPABASE_JWT_SECRET"       "$SUPABASE_JWT_SECRET"
          put "/study-helper/backend/SUPABASE_DB_URL"           "$SUPABASE_DB_URL"

  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 (SSM)
    needs: [build-and-push, sync-secrets]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger deploy via SSM
        env:
          SHA: ${{ github.sha }}
        run: |
          set -e
          COMMAND_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend ${SHA:0:7}" \
            --parameters "commands=[\"sudo bash /opt/study-helper-backend/deploy/deploy.sh ${SHA}\"]" \
            --query 'Command.CommandId' --output text)
          echo "Command ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait for SSM command completion
        run: |
          set -e
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --region "${AWS_REGION}" \
              --command-id "${command_id}" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            case "$STATUS" in
              Success)
                echo "── stdout ──"
                aws ssm get-command-invocation \
                  --region "${AWS_REGION}" \
                  --command-id "${command_id}" \
                  --instance-id "${EC2_INSTANCE_ID}" \
                  --query 'StandardOutputContent' --output text
                exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "::error::Deploy failed: $STATUS"
                echo "── stdout ──"
                aws ssm get-command-invocation \
                  --region "${AWS_REGION}" \
                  --command-id "${command_id}" \
                  --instance-id "${EC2_INSTANCE_ID}" \
                  --query 'StandardOutputContent' --output text
                echo "── stderr ──"
                aws ssm get-command-invocation \
                  --region "${AWS_REGION}" \
                  --command-id "${command_id}" \
                  --instance-id "${EC2_INSTANCE_ID}" \
                  --query 'StandardErrorContent' --output text
                exit 1 ;;
            esac
            sleep 5
          done
          echo "::error::Deploy timed out after 5 minutes"
          exit 1
